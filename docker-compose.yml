version: '3.8'

services:
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - lexprobe-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - qdrant
    networks:
      - lexprobe-network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./ui:/usr/share/nginx/html
    networks:
      - lexprobe-network
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  lexprobe-network:
    driver: bridge