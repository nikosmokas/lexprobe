        #   git pull origin main
        #   export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
        #   docker-compose down
        #   docker-compose pull
        #   docker-compose up -d
        #   docker system prune -f
        # EOF

        # Option 2: Deploy to Railway/Render/Vercel
